# policy/controls/secrets.yaml
secrets_non_exposure_proof:
  description: Secrets Plane Proof — Secret value is never retrieved; only secret id is returned
  risk_level: High
  blast_radius: Data
  plane: Secrets
  impact: Retrieving secret values violates the boundary evidence model and increases exfiltration risk
  timeout_sec_max: 120
  script:
    - az
    - keyvault
    - secret
    - show
    - --vault-name
    - kv-fortress-dev
    - --name
    - kv-fortress-token
    - --query
    - id
    - -o
    - tsv
  remediation:
    - Do not request secret value; retrieve only metadata and ids